name: ESLint rules drift
on:
  schedule:
    - cron: '0 8 * * 2'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  eslint-rules-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: NPM install
        run: |
          npm ci

      - name: Upstream rules check
        id: upstream
        run: |
          node --test --test-name-pattern='upstream rules match config'

      - name: Open issue on upstream drift
        if: failure() && steps.upstream.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = 'Quality gate: @eslint/markdown upstream rules drifted';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            if (existing.some((i) => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Scheduled upstream-rules check failed — @eslint/markdown likely added, renamed, or removed rules.\n\nRun: ${runUrl}`,
            });
