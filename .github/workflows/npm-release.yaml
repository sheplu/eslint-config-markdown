name: Publish package
on:
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Ensure release commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "Release commit ${{ github.sha }} is not on main — aborting."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Validate release tag format
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if ! printf '%s' "$TAG_NAME" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Release tag '$TAG_NAME' is not a valid semver tag (expected e.g. v1.2.3, 1.2.3, or 1.2.3-rc.1) — aborting."
            exit 1
          fi
          echo "Tag format OK: '$TAG_NAME'."

      - name: Version
        run: |
          VERSION=${{ github.event.release.tag_name }}
          VERSION=${VERSION#v}
          CURRENT_VERSION=$(npm pkg get version | tr -d '"')
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            npm version $VERSION --no-git-tag-version
          else
            echo "Version already set to $VERSION, skipping npm version command"
          fi

      - name: publish (dry run)
        run: |
          npm publish --access public --provenance --dry-run

      - name: publish
        run: |
          npm publish --access public --provenance
